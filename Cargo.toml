[package]
name = "voltaria-sdk"
version = "2.34.7"
edition = "2021"
description = "Rust SDK for voltaria_api generated by Fern"
license = "MIT"
repository = "https://github.com/voltariafinance/rust-sdk"
documentation = "https://docs.rs/voltaria_api"

[lib]
doctest = false

[dependencies]
base64 = "0.22"
bytes = "1.0"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = ["multipart"]
multipart = ["reqwest/multipart"]
